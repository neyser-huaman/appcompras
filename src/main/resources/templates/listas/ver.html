<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Lista</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container py-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h2 class="mb-1" th:text="${listaCompra.nombre}">Nombre de la lista</h2>
            <p class="text-muted mb-0">
                Fecha:
                <span th:text="${listaCompra.fecha != null ? listaCompra.fecha : '-'}">-</span>
                -
                Estado:
                <span th:text="${listaCompra.estado != null ? listaCompra.estado.nombre : 'Sin estado'}">-</span>
            </p>
        </div>

        <div class="d-flex flex-wrap gap-2">
            <a th:href="@{/listas/{listaId}/items/nuevo(listaId=${listaCompra.id})}" class="btn btn-primary">
                Agregar item
            </a>
            <a th:href="@{/listas/editar/{id}(id=${listaCompra.id})}" class="btn btn-warning">
                Editar lista
            </a>
            <a th:href="@{/listas}" class="btn btn-secondary">
                Volver
            </a>
        </div>
    </div>

    <div th:if="${mensaje}" class="alert alert-info" th:text="${mensaje}"></div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header">
            <h5 class="mb-0">Información de la lista</h5>
        </div>
        <div class="card-body">
            <p class="mb-2">
                <strong>Observación:</strong>
                <span th:text="${listaCompra.observacion != null and !#strings.isEmpty(listaCompra.observacion) ? listaCompra.observacion : 'Sin observaciones'}">
                    Sin observaciones
                </span>
            </p>

            <p class="mb-0">
                <strong>Total de items:</strong>
                <span class="badge bg-primary"
                      th:text="${listaCompra.items != null ? #lists.size(listaCompra.items) : 0}">
                    0
                </span>
            </p>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header">
            <h5 class="mb-0">Items de la lista</h5>
        </div>
        <div class="card-body">
            <div th:if="${listaCompra.items == null or #lists.isEmpty(listaCompra.items)}"
                 class="alert alert-light border mb-0">
                No hay items registrados en esta lista.
            </div>

            <div class="table-responsive" th:if="${listaCompra.items != null and !#lists.isEmpty(listaCompra.items)}">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Peso</th>
                        <th>Precio</th>
                        <th style="min-width: 260px;">Estado</th>
                        <th>Observación</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${listaCompra.items}">
                        <td th:text="${item.producto != null ? item.producto.nombre : 'Producto'}">Producto</td>
                        <td th:text="${item.cantidad != null ? item.cantidad : '-'}">-</td>
                        <td th:text="${item.peso != null ? item.peso : '-'}">-</td>
                        <td th:text="${item.precio != null ? item.precio : '-'}">-</td>

                        <td>
                            <form th:action="@{/listas/{listaId}/items/cambiar-estado/{id}(listaId=${listaCompra.id}, id=${item.id})}"
                                  method="post"
                                  class="d-flex gap-2 align-items-center">

                                <select name="estadoId" class="form-select form-select-sm">
                                    <option th:each="estado : ${estados}"
                                            th:value="${estado.id}"
                                            th:text="${estado.nombre}"
                                            th:selected="${item.estado != null and item.estado.id == estado.id}">
                                    </option>
                                </select>

                                <button type="submit" class="btn btn-sm btn-outline-primary">
                                    Guardar
                                </button>
                            </form>
                        </td>

                        <td th:text="${item.observacion != null and !#strings.isEmpty(item.observacion) ? item.observacion : '-'}">-</td>

                        <td class="text-center">
                            <div class="d-flex flex-wrap justify-content-center gap-2">
                                <a th:href="@{/listas/{listaId}/items/editar/{id}(listaId=${listaCompra.id}, id=${item.id})}"
                                   class="btn btn-sm btn-warning">
                                    Editar
                                </a>
                                <a th:href="@{/listas/{listaId}/items/eliminar/{id}(listaId=${listaCompra.id}, id=${item.id})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('¿Seguro que deseas eliminar este item?');">
                                    Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
