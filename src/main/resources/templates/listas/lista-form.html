<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1 class="mb-4">Nueva Lista</h1>

<form th:action="@{/listas}" th:object="${listaCompra}" method="post">

    <div class="mb-3">
        <label class="form-label">Número</label>
        <input type="number" class="form-control" th:field="*{numero}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" th:field="*{nombre}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Fecha</label>
        <input type="date" class="form-control" th:field="*{fecha}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Observación</label>
        <input type="text" class="form-control" th:field="*{observacion}">
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
    <a th:href="@{/listas}" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
