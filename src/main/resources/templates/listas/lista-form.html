<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${lista.id != null ? 'Editar lista' : 'Nueva lista'}">Formulario lista</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-9 col-xl-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light py-3">
                    <h3 class="mb-0" th:text="${lista.id != null ? 'Editar lista' : 'Nueva lista'}"></h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/listas/guardar}" th:object="${lista}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">

                            <div class="col-12 col-md-6">
                                <label class="form-label">Fecha</label>
                                <input type="date" th:field="*{fecha}" class="form-control" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Nombre</label>
                                <input type="text" th:field="*{nombre}" class="form-control" required>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Observación</label>
                                <textarea th:field="*{observacion}" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="col-12 col-md-6" th:if="${lista.id != null}">
                                <label class="form-label">Estado</label>
                                <input type="text"
                                       class="form-control"
                                       th:value="${lista.estado != null ? lista.estado.nombre : 'PENDIENTE'}"
                                       readonly>
                            </div>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">Guardar</button>
                            <a th:href="@{/listas}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
