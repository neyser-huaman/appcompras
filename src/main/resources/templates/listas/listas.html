<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listas de compra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h2 class="mb-1">Listas de compra</h2>
            <p class="text-muted mb-0">Administra tus listas y revisa sus productos.</p>
        </div>
        <a th:href="@{/listas/nueva}" class="btn btn-primary">Nueva lista</a>
    </div>

    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-none d-md-block">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Número</th>
                            <th>Nombre</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Cantidad productos</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="lista : ${listas}">
                            <td th:text="${lista.id}"></td>
                            <td th:text="${lista.numero}"></td>
                            <td th:text="${lista.nombre}"></td>
                            <td th:text="${lista.fecha}"></td>
                            <td>
                                <span class="badge text-bg-secondary"
                                      th:text="${lista.estado != null ? lista.estado.nombre : 'PENDIENTE'}"></span>
                            </td>
                            <td th:text="${lista.items != null ? #lists.size(lista.items) : 0}"></td>
                            <td class="text-center">
                                <div class="d-flex flex-wrap justify-content-center gap-2">
                                    <a th:href="@{'/listas/ver/' + ${lista.id}}" class="btn btn-sm btn-info text-white">Ver</a>
                                    <a th:href="@{'/listas/editar/' + ${lista.id}}" class="btn btn-sm btn-warning">Editar</a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listas)}">
                            <td colspan="7" class="text-center text-muted py-4">No hay listas registradas.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="d-md-none">
        <div class="row g-3">
            <div class="col-12" th:each="lista : ${listas}">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                            <h5 class="card-title mb-0" th:text="${lista.nombre}"></h5>
                            <span class="badge text-bg-secondary"
                                  th:text="${lista.estado != null ? lista.estado.nombre : 'PENDIENTE'}"></span>
                        </div>

                        <p class="mb-1"><strong>ID:</strong> <span th:text="${lista.id}"></span></p>
                        <p class="mb-1"><strong>Número:</strong> <span th:text="${lista.numero}"></span></p>
                        <p class="mb-1"><strong>Fecha:</strong> <span th:text="${lista.fecha}"></span></p>
                        <p class="mb-3"><strong>Productos:</strong> <span th:text="${lista.items != null ? #lists.size(lista.items) : 0}"></span></p>

                        <div class="d-grid gap-2">
                            <a th:href="@{'/listas/ver/' + ${lista.id}}" class="btn btn-info text-white">Ver</a>
                            <a th:href="@{'/listas/editar/' + ${lista.id}}" class="btn btn-warning">Editar</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12" th:if="${#lists.isEmpty(listas)}">
                <div class="alert alert-light border text-center mb-0">No hay listas registradas.</div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
