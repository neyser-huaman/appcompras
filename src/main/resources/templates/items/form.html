<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${item != null and item.id != null ? 'Editar item' : 'Nuevo item'}">Formulario item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-light py-3">
                    <h3 class="mb-0"
                        th:text="${item != null and item.id != null ? 'Editar item' : 'Nuevo item'}">
                        Formulario item
                    </h3>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/listas/{listaId}/items/guardar(listaId=${listaCompra.id})}"
                          th:object="${item}"
                          method="post"
                          id="itemForm">

                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">

                            <div class="col-12" th:if="${item == null or item.id == null}">
                                <label class="form-label">Producto</label>
                                <select th:field="*{producto.id}" class="form-select" required>
                                    <option value="">Seleccione un producto</option>
                                    <option th:each="p : ${productos}"
                                            th:value="${p.id}"
                                            th:text="${p.nombre}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-12" th:if="${item != null and item.id != null}">
                                <label class="form-label">Producto</label>
                                <input type="text"
                                       class="form-control"
                                       th:value="${item.producto != null ? item.producto.nombre : ''}"
                                       disabled>

                                <input type="hidden" th:field="*{producto.id}">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Cantidad</label>
                                <input type="number"
                                       min="0"
                                       step="1"
                                       th:field="*{cantidad}"
                                       class="form-control"
                                       id="cantidad">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Peso</label>
                                <input type="number"
                                       min="0"
                                       step="0.01"
                                       th:field="*{peso}"
                                       class="form-control"
                                       id="peso">
                            </div>

                            <div class="col-md-4" th:if="${item != null and item.id != null}">
                                <label class="form-label">Precio</label>
                                <input type="number"
                                       min="0"
                                       step="0.01"
                                       th:field="*{precio}"
                                       class="form-control">
                            </div>

                            <div class="col-md-6" th:if="${item != null and item.id != null}">
                                <label class="form-label">Estado</label>
                                <select th:field="*{estado.id}" class="form-select">
                                    <option value="">Seleccione un estado</option>
                                    <option th:each="e : ${estados}"
                                            th:value="${e.id}"
                                            th:text="${e.nombre}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Observación</label>
                                <textarea th:field="*{observacion}" class="form-control" rows="3"></textarea>
                            </div>
                        </div>

                        <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                            <button type="submit" class="btn btn-primary" id="btnGuardar" disabled>
                                Guardar
                            </button>
                            <a th:href="@{/listas/ver/{id}(id=${listaCompra.id})}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const cantidadInput = document.getElementById("cantidad");
        const pesoInput = document.getElementById("peso");
        const btnGuardar = document.getElementById("btnGuardar");

        function validarFormulario() {
            const cantidad = cantidadInput ? cantidadInput.value.trim() : "";
            const peso = pesoInput ? pesoInput.value.trim() : "";

            const cantidadValida = cantidad !== "" && Number(cantidad) > 0;
            const pesoValido = peso !== "" && Number(peso) > 0;

            btnGuardar.disabled = !(cantidadValida || pesoValido);
        }

        if (cantidadInput) {
            cantidadInput.addEventListener("input", validarFormulario);
        }

        if (pesoInput) {
            pesoInput.addEventListener("input", validarFormulario);
        }

        validarFormulario();
    });
</script>

</body>
</html>
