<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${item.id == null ? 'Nuevo Item' : 'Editar Item'}">Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0" th:text="${item.id == null ? 'Agregar item a la lista' : 'Editar item de la lista'}">
                        Formulario Item
                    </h3>
                </div>

                <div class="card-body">
                    <div th:if="${mensaje}" class="alert alert-warning" th:text="${mensaje}"></div>

                    <form th:action="@{/listas/{listaId}/items/guardar(listaId=${listaCompra.id})}"
                          th:object="${item}"
                          method="post">

                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label">Lista</label>
                            <input type="text" class="form-control" th:value="${listaCompra.nombre}" readonly>
                        </div>

                        <!-- PRODUCTO -->
                        <div class="mb-3" th:if="${item.id == null}">
                            <label for="producto" class="form-label">Producto</label>
                            <select id="producto" class="form-select" th:field="*{producto.id}" required>
                                <option value="">-- Seleccione un producto --</option>
                                <option th:each="p : ${productos}"
                                        th:value="${p.id}"
                                        th:text="${p.nombre}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3" th:if="${item.id != null}">
                            <label class="form-label">Producto</label>
                            <input type="text" class="form-control" th:value="${item.producto.nombre}" readonly>
                            <input type="hidden" th:field="*{producto.id}" />
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="cantidad" class="form-label">Cantidad</label>
                                <input type="number"
                                       id="cantidad"
                                       class="form-control"
                                       th:field="*{cantidad}"
                                       min="0"
                                       placeholder="Ej. 2">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="peso" class="form-label">Peso</label>
                                <input type="number"
                                       id="peso"
                                       class="form-control"
                                       th:field="*{peso}"
                                       min="0"
                                       step="0.001"
                                       placeholder="Ej. 1.500">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="precio" class="form-label">Precio</label>
                            <input type="number"
                                   id="precio"
                                   class="form-control"
                                   th:field="*{precio}"
                                   min="0"
                                   step="0.01"
                                   placeholder="Ej. 12.50">
                        </div>

                        <div class="mb-3" th:if="${item.id != null}">
                            <label for="estado" class="form-label">Estado</label>
                            <select id="estado" class="form-select" th:field="*{estado.id}">
                                <option value="">-- Seleccione un estado --</option>
                                <option th:each="e : ${estados}"
                                        th:value="${e.id}"
                                        th:text="${e.nombre}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="observacion" class="form-label">Observación</label>
                            <textarea id="observacion"
                                      class="form-control"
                                      th:field="*{observacion}"
                                      rows="3"
                                      placeholder="Detalle adicional del item"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">Guardar</button>
                            <a th:href="@{/listas/ver/{id}(id=${listaCompra.id})}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const cantidadInput = document.getElementById('cantidad');
    const pesoInput = document.getElementById('peso');

    function normalizarVacioACero(input) {
        if (input && input.value !== '' && Number(input.value) < 0) {
            input.value = 0;
        }
    }

    if (cantidadInput) {
        cantidadInput.addEventListener('input', function () {
            normalizarVacioACero(cantidadInput);
        });
    }

    if (pesoInput) {
        pesoInput.addEventListener('input', function () {
            normalizarVacioACero(pesoInput);
        });
    }
</script>

</body>
</html>
