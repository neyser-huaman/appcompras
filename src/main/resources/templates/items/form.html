<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Agregar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h1 class="mb-4">Agregar producto a la lista</h1>

    <form th:action="@{/listas/{listaId}/items(listaId=${listaCompra.id})}"
          th:object="${item}" method="post">

        <div class="mb-3">
            <label class="form-label">Producto</label>
            <select name="productoId" class="form-select" required>
                <option value="">Seleccione...</option>
                <option th:each="p : ${productos}"
                        th:value="${p.id}"
                        th:text="${p.nombre}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" class="form-control" th:field="*{cantidad}" min="1">
        </div>

        <div class="mb-3">
            <label class="form-label">Peso</label>
            <input type="number" step="0.001" class="form-control" th:field="*{peso}" min="0">
            <div class="form-text">Usa este campo cuando el producto se compra por peso.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" class="form-control" th:field="*{precio}">
        </div>

        <div class="mb-3">
            <label class="form-label">Observación</label>
            <input type="text" class="form-control" th:field="*{observacion}">
        </div>

        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/listas/{id}(id=${listaCompra.id})}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

</body>
</html>
