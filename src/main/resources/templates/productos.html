<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Productos</h1>
    <a th:href="@{/productos/nuevo}" class="btn btn-primary">Nuevo producto</a>
</div>

<table class="table table-bordered table-hover">
    <thead class="table-light">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="producto : ${productos}">
        <td th:text="${producto.id}"></td>
        <td th:text="${producto.nombre}"></td>
        <td th:text="${producto.descripcion}"></td>
        <td>
            <span th:if="${producto.activo}" class="badge bg-success">Activo</span>
            <span th:unless="${producto.activo}" class="badge bg-secondary">Inactivo</span>
        </td>
        <td class="d-flex gap-2">
            <a th:href="@{/productos/editar/{id}(id=${producto.id})}" class="btn btn-warning btn-sm">Editar</a>

            <a th:href="@{/productos/estado/{id}(id=${producto.id})}"
               th:class="${producto.activo} ? 'btn btn-danger btn-sm' : 'btn btn-success btn-sm'"
               th:text="${producto.activo} ? 'Desactivar' : 'Activar'"
               onclick="return confirm('¿Deseas cambiar el estado de este producto?')">
            </a>
        </td>
    </tr>
    </tbody>
</table>

<div class="mt-3">
    <a th:href="@{/listas}" class="btn btn-secondary">Volver a listas</a>
</div>

</body>
</html>
