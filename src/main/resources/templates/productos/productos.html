<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container py-4">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
        <div>
            <h2 class="mb-1">Productos</h2>
            <p class="text-muted mb-0">Administra tus productos y su estado.</p>
        </div>
        <a th:href="@{/productos/nuevo}" class="btn btn-primary">Nuevo producto</a>
    </div>

    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-none d-md-block">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="producto : ${productos}">
                            <td th:text="${producto.id}"></td>
                            <td th:text="${producto.nombre}"></td>
                            <td th:text="${producto.descripcion}"></td>
                            <td>
                                <span th:if="${producto.activo}" class="badge text-bg-success">Activo</span>
                                <span th:unless="${producto.activo}" class="badge text-bg-danger">Inactivo</span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex flex-wrap justify-content-center gap-2">
                                    <a th:href="@{'/productos/editar/' + ${producto.id}}" class="btn btn-sm btn-warning">Editar</a>

                                    <a th:if="${producto.activo}"
                                       th:href="@{'/productos/toggle/' + ${producto.id}}"
                                       class="btn btn-sm btn-danger">
                                        Desactivar
                                    </a>

                                    <a th:unless="${producto.activo}"
                                       th:href="@{'/productos/toggle/' + ${producto.id}}"
                                       class="btn btn-sm btn-success">
                                        Activar
                                    </a>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(productos)}">
                            <td colspan="5" class="text-center text-muted py-4">No hay productos registrados.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="d-md-none">
        <div class="row g-3">
            <div class="col-12" th:each="producto : ${productos}">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                            <h5 class="card-title mb-0" th:text="${producto.nombre}"></h5>
                            <span th:if="${producto.activo}" class="badge text-bg-success">Activo</span>
                            <span th:unless="${producto.activo}" class="badge text-bg-danger">Inactivo</span>
                        </div>

                        <p class="mb-1"><strong>ID:</strong> <span th:text="${producto.id}"></span></p>
                        <p class="mb-3"><strong>Descripción:</strong> <span th:text="${producto.descripcion}"></span></p>

                        <div class="d-grid gap-2">
                            <a th:href="@{'/productos/editar/' + ${producto.id}}" class="btn btn-warning">Editar</a>

                            <a th:if="${producto.activo}"
                               th:href="@{'/productos/toggle/' + ${producto.id}}"
                               class="btn btn-danger">
                                Desactivar
                            </a>

                            <a th:unless="${producto.activo}"
                               th:href="@{'/productos/toggle/' + ${producto.id}}"
                               class="btn btn-success">
                                Activar
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12" th:if="${#lists.isEmpty(productos)}">
                <div class="alert alert-light border text-center mb-0">No hay productos registrados.</div>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
