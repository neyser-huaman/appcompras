<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1 class="mb-4">Productos</h1>

<a th:href="@{/productos/nuevo}" class="btn btn-primary mb-3">Nuevo Producto</a>

<table class="table table-striped">
    <thead class="table-dark">
    <tr>
        <th>Nombre</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="producto : ${productos}">
        <td th:text="${producto.nombre}"></td>

        <td>
                <span th:class="${producto.activo} ? 'badge bg-success' : 'badge bg-danger'"
                      th:text="${producto.activo} ? 'Activo' : 'Inactivo'">
                </span>
        </td>

        <td>
            <a th:href="@{/productos/editar/{id}(id=${producto.id})}"
               class="btn btn-warning btn-sm">Editar</a>

            <a th:href="@{/productos/toggle/{id}(id=${producto.id})}"
               th:text="${producto.activo} ? 'Desactivar' : 'Activar'"
               th:class="${producto.activo} ? 'btn btn-danger btn-sm' : 'btn btn-success btn-sm'">
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
