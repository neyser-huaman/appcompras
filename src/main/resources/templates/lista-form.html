<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h1 class="mb-4">Nueva lista de compra</h1>

<form th:action="@{/listas}" th:object="${listaCompra}" method="post" class="card p-4 shadow-sm">

    <div class="mb-3">
        <label class="form-label">Número</label>
        <input type="number" th:field="*{numero}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" th:field="*{nombre}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Fecha</label>
        <input type="date" th:field="*{fecha}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Observación</label>
        <textarea th:field="*{observacion}" class="form-control" rows="3"></textarea>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-success">Guardar</button>
        <a th:href="@{/listas}" class="btn btn-secondary">Cancelar</a>
    </div>

</form>

</body>
</html>
